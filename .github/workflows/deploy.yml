
name: Deploy AWS Cost Intelligence Lambdas

on:
  push:
    branches:
      - main
   
jobs:
  deploy:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    strategy:
       matrix: 
         lambda: 
          - function_name: cost-collector 
            file_name: cost-collector.py 
          - function_name: waste-detector
            file_name: waste-detector.py 
          - function_name: cost-intelligence-api 
            file_name: api_handler.py
    steps:

      # Step 1 - Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v5
      #Step 2- Set Up Python  
      - name: Set Up Python 
        uses: actions/setup-python@v5 
        with: 
          python-version: '3.14'
      # Step 3 - Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package Lambda Function
        run: | 
               cp lambdas/${{ matrix.lambda.file_name }} package/ 
               cd package 
               zip -r ../${{ matrix.lambda.function_name }}.zip . 
      - name: Deploy Lambda Function 
        run: | 
            aws lambda update-function-code \ 
            --function-name ${{ matrix.lambda.function_name }} \ 
            --zip-file fileb://${{ matrix.lambda.function_name }}.zip
