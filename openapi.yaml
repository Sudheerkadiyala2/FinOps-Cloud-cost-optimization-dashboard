openapi: 3.0.3

info:
  title: Cloud Cost Intelligence API
  description: Serverless FinOps platform for cloud cost visibility and waste detection.
  version: 1.0.0

servers:
  - url: https://naijpkbw4m.execute-api.us-east-1.amazonaws.com

paths:

  /summary:
    get:
      summary: Get dashboard summary
      description: Returns high level waste metrics.
      responses:
        '200':
          description: Successful response

  /trends:
    get:
      summary: Get spend trends
      description: Returns daily spend trend and cost by service.
      responses:
        '200':
          description: Successful response

  /findings:
    get:
      summary: Get waste findings
      description: Returns all waste findings detected by the system.
      responses:
        '200':
          description: Successful response
